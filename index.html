<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Graduation Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Page 1: fixed invitation image overlay -->
  <div id="page1" class="page active">
    <div class="image-container">
      <img src="images/invitation.png" alt="Graduation Invitation" draggable="false">
      <div class="clickable seal-area" id="sealArea" role="button" aria-label="Open invitation"></div>
      <div class="clickable text-area" id="textArea" role="button" aria-label="انقر هنا"></div>
    </div>
  </div>

  <!-- Page 2: video section — sits in document flow so date section can follow -->
  <div id="page2" class="page">
    <video class="page2-video" autoplay muted loop playsinline preload="auto">
      <source src="videos/background.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="invitation-content">
      <p class="poem">
        ما ضاعَ جُهدُ الأمسِ في يومٍ سُدى<br>
        واللهُ يُجزي الحُسنَ بالإحسانِ
      </p>

      <p class="invitation-message">
        ولأن الأفراح لا تتم إلا بحضور من نحب،<br>
        يسعدني ويشرفني دعوتكم لحضور
      </p>

      <h1 class="graduation-title">حـفـل تـخـرجـي</h1>
      <p class="class-of">Class of</p>
      <p class="class-year">2026</p>
    </div>

    <!-- Subtle scroll indicator, shown after the transition -->
    <div class="scroll-hint" aria-hidden="true">
      <span>اسحب للأسفل</span>
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
        <polyline points="1,1 7,8 13,1" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- Date section: follows page2 in normal scroll flow -->
  <section id="date-section" class="date-section" aria-label="تاريخ حفل التخرج">
    <div class="date-content">

      <div class="calendar-graduation-icon">
        <svg viewBox="0 0 100 125" fill="none" xmlns="http://www.w3.org/2000/svg"
             stroke="#51463D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- Mortarboard top plate -->
          <polygon points="50,5 88,22 50,39 12,22"/>
          <!-- Stem connecting cap to calendar -->
          <line x1="50" y1="39" x2="50" y2="53"/>
          <!-- Tassel cord -->
          <line x1="79" y1="22" x2="79" y2="37"/>
          <!-- Tassel threads -->
          <line x1="76" y1="37" x2="73" y2="45"/>
          <line x1="79" y1="37" x2="79" y2="45"/>
          <line x1="82" y1="37" x2="85" y2="45"/>
          <!-- Calendar binding rings -->
          <line x1="30" y1="48" x2="30" y2="59"/>
          <line x1="70" y1="48" x2="70" y2="59"/>
          <!-- Calendar body -->
          <rect x="12" y="53" width="76" height="68" rx="5"/>
          <!-- Header fill (subtle) -->
          <rect x="12" y="53" width="76" height="18" rx="5"
                fill="#51463D" fill-opacity="0.08" stroke="none"/>
          <!-- Header divider line -->
          <line x1="12" y1="71" x2="88" y2="71" stroke-width="1.1"/>
          <!-- Date grid — 2 rows × 3 columns -->
          <rect x="20" y="79" width="10" height="9" rx="2" stroke-width="1.4"/>
          <rect x="45" y="79" width="10" height="9" rx="2" stroke-width="1.4"/>
          <rect x="70" y="79" width="10" height="9" rx="2" stroke-width="1.4"/>
          <rect x="20" y="95" width="10" height="9" rx="2" stroke-width="1.4"/>
          <rect x="45" y="95" width="10" height="9" rx="2" stroke-width="1.4"/>
          <rect x="70" y="95" width="10" height="9" rx="2" stroke-width="1.4"/>
        </svg>
      </div>

      <p class="date-intro">وبذلك بمشيئة الله تعالى</p>
      <p class="day-name">يوم الخميس</p>
      <p class="gregorian-date" dir="ltr">20 / 8 / 2026</p>
      <p class="hijri-date">الموافق 7 / 3 / 1448 هـ</p>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
