<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Graduation Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="page1" class="page active">
    <div class="image-container">
      <img src="images/invitation.png" alt="Graduation Invitation" draggable="false">
      <div class="clickable seal-area" id="sealArea" role="button" aria-label="Open invitation"></div>
      <div class="clickable text-area" id="textArea" role="button" aria-label="انقر هنا"></div>
    </div>
  </div>

  <div id="page2" class="page">
    <video class="page2-video" autoplay muted loop playsinline preload="auto">
      <source src="videos/background.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="invitation-content">
      <p class="poem">
        ما ضاعَ جُهدُ الأمسِ في يومٍ سُدى<br>
        واللهُ يُجزي الحُسنَ بالإحسانِ
      </p>

      <p class="invitation-message">
        ولأن الأفراح لا تتم إلا بحضور من نحب،<br>
        يسعدني ويشرفني دعوتكم لحضور
      </p>

      <h1 class="graduation-title">حفل تخرجي</h1>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
